name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "لینک ویدیو یوتیوب"
        required: true
        type: string

      output_format:
        description: "فرمت خروجی"
        required: true
        default: mp4
        type: choice
        options:
          - mp4
          - mp3

      desired_quality:
        description: "کیفیت دلخواه (مثلاً 720 یا 128)"
        required: false
        type: string

      max_part_mb:
        description: "حداکثر حجم هر پارت (MB)"
        required: false
        default: "1900"
        type: string

permissions:
  contents: write

concurrency:
  group: youtube-downloader
  cancel-in-progress: false

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            curl \
            python3 \
            python3-pip \
            p7zip-full

          pip3 install --quiet requests==2.32.3

      - name: Retrieve Download Link
        id: retrieve
        shell: bash
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
          DESIRED_QUALITY: ${{ github.event.inputs.desired_quality }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import re
          import time
          import requests

          video_url = os.environ["VIDEO_URL"]
          output_format = os.environ["OUTPUT_FORMAT"]
          desired_quality = os.environ.get("DESIRED_QUALITY", "").strip()

          if not video_url.startswith(("https://", "http://")):
              raise Exception("Invalid video URL")

          if output_format not in ["mp4", "mp3"]:
              raise Exception("Invalid output format")

          quality = desired_quality or ("720" if output_format == "mp4" else "128")

          if output_format == "mp4":
              endpoint = "https://hub.ytconvert.org/convert/"
              payload = {
                  "url": video_url,
                  "format": "mp4",
                  "quality": quality
              }
          else:
              endpoint = "https://media.ytmp3.gg/api/convert"
              payload = {
                  "url": video_url,
                  "format": "mp3",
                  "quality": quality
              }

          session = requests.Session()

          response = session.post(endpoint, json=payload, timeout=30)
          response.raise_for_status()

          data = response.json()

          status_url = (
              data.get("status_url")
              or data.get("url")
              or data.get("status")
          )

          if not status_url:
              raise Exception("No status URL returned")

          download_url = None
          title = "youtube_media"

          for attempt in range(150):
              poll = session.get(status_url, timeout=30)
              poll.raise_for_status()

              result = poll.json()

              if result.get("status") == "completed":
                  download_url = (
                      result.get("download_url")
                      or result.get("url")
                  )

                  title = result.get("title", title)
                  break

              if result.get("status") == "failed":
                  raise Exception("Conversion failed")

              time.sleep(2)

          if not download_url:
              raise Exception("Timed out waiting for conversion")

          safe_title = re.sub(r'[\\/*?:"<>|]', "", title).strip()

          extension = output_format
          filename = f"{safe_title}.{extension}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"filename={filename}\n")
              gh.write(f"title={safe_title}\n")
              gh.write(f"download_url={download_url}\n")

          print("Filename:", filename)
          print("Download URL acquired.")
          PY

      - name: Download File
        shell: bash
        env:
          DOWNLOAD_URL: ${{ steps.retrieve.outputs.download_url }}
          FILENAME: ${{ steps.retrieve.outputs.filename }}
        run: |
          set -euo pipefail

          mkdir -p release_files

          curl \
            -L \
            --fail \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            --progress-bar \
            -o "release_files/$FILENAME" \
            "$DOWNLOAD_URL"

          if [ ! -s "release_files/$FILENAME" ]; then
            echo "Downloaded file is empty"
            exit 1
          fi

      - name: Split Large File
        shell: bash
        run: |
          set -euo pipefail

          FILE="release_files/${{ steps.retrieve.outputs.filename }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          FILE_SIZE_MB=$(du -m "$FILE" | cut -f1)

          echo "File size: ${FILE_SIZE_MB}MB"

          if [ "$FILE_SIZE_MB" -gt "$THRESH_MB" ]; then
            echo "Splitting large file..."

            BASENAME=$(basename "$FILE")
            NAME="${BASENAME%.*}"

            mkdir -p split_output

            7z a \
              -v${THRESH_MB}m \
              -mx=0 \
              "split_output/${NAME}.7z" \
              "$FILE"

            rm -f "$FILE"

            mv split_output/* release_files/

            echo "Split completed."
          else
            echo "No split needed."
          fi

      - name: Generate Checksums
        shell: bash
        run: |
          set -euo pipefail

          cd release_files

          sha256sum * > SHA256SUMS.txt

      - name: Prepare Repository Paths
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          DATE_PATH=$(date +"%Y/%m/%d")

          TARGET_DIR="downloads/$DATE_PATH"

          mkdir -p "$TARGET_DIR"

          echo "target_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"

      - name: Move Files
        shell: bash
        run: |
          set -euo pipefail

          mv release_files/* "${{ steps.prep.outputs.target_dir }}/"

      - name: Commit And Push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add downloads/

          git commit -m "Add downloaded media - $(date +"%Y-%m-%d %H:%M:%S")" || echo "Nothing to commit"

          git pull --rebase origin main || true

          git push

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf release_files split_output
