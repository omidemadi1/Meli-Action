name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "لینک ویدیو یوتیوب"
        required: true
        type: string

      output_format:
        description: "نوع خروجی"
        required: true
        type: choice
        options:
          - mp4
          - mp3
        default: mp4

      desired_quality:
        description: "کیفیت دلخواه"
        required: false
        type: string
        default: ""

      max_part_mb:
        description: "حداکثر حجم هر قسمت (MB) - 0 یعنی خودکار 1800"
        required: false
        type: string
        default: "1800"

      upload_method:
        description: "روش ذخیره نهایی"
        required: true
        type: choice
        options:
          - repository
          - release
        default: repository

      release_tag:
        description: "تگ ریلیز (فقط برای حالت release)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: youtube-downloader
  cancel-in-progress: false

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl python3 python3-pip zip
          pip3 install --quiet requests==2.32.3

      - name: Get Download Link
        id: retrieve
        shell: bash
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
          DESIRED_QUALITY: ${{ github.event.inputs.desired_quality }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import os
          import re
          import time
          import requests

          video_url = os.environ["VIDEO_URL"].strip()
          output_format = os.environ["OUTPUT_FORMAT"].strip()
          desired_quality = os.environ.get("DESIRED_QUALITY", "").strip()

          if not video_url.startswith(("http://", "https://")):
              raise Exception("Invalid video URL")

          if output_format not in ("mp4", "mp3"):
              raise Exception("Invalid output format")

          quality = desired_quality or ("720p" if output_format == "mp4" else "192kbps")

          session = requests.Session()
          session.headers.update({
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125 Safari/537.36"
          })

          # Warm-up request, if the provider expects a browser-like session
          session.get("https://media.ytmp3.gg/", timeout=30)

          if output_format == "mp4":
              api_url = "https://hub.ytconvert.org/api/download"
              payload = {
                  "url": video_url,
                  "os": "linux",
                  "output": {
                      "type": "video",
                      "format": "mp4",
                      "quality": quality
                  }
              }
          else:
              api_url = "https://hub.ytconvert.org/api/download"
              payload = {
                  "url": video_url,
                  "os": "linux",
                  "output": {
                      "type": "audio",
                      "format": "mp3"
                  },
                  "audio": {
                      "bitrate": quality
                  }
              }

          resp = session.post(api_url, json=payload, timeout=30)
          resp.raise_for_status()
          data = resp.json()

          status_url = data.get("statusUrl") or data.get("status_url") or data.get("url")
          title = data.get("title", "video")

          if not status_url:
              raise Exception("No status URL returned by API")

          download_url = None
          for _ in range(150):
              time.sleep(2)
              r = session.get(status_url, timeout=30)
              r.raise_for_status()
              status = r.json()

              if status.get("status") == "completed":
                  download_url = status.get("downloadUrl") or status.get("download_url") or status.get("url")
                  if not download_url:
                      raise Exception("Completed but no download URL returned")
                  break

              if status.get("status") == "failed":
                  raise Exception("Server failed to prepare the file")

          if not download_url:
              raise Exception("Timed out waiting for the download link")

          video_id_match = re.search(r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})', video_url)
          video_id = video_id_match.group(1) if video_id_match else "youtube"

          safe_title = re.sub(r'[^a-zA-Z0-9\-_()\\[\\]]', '_', title.replace(' ', '_'))
          safe_title = re.sub(r'_+', '_', safe_title).strip('_')[:70] or video_id

          filename = f"{safe_title}_{video_id}.{output_format}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"filename={filename}\n")
              f.write(f"title={title}\n")
              f.write(f"download_url={download_url}\n")

          print(f"filename={filename}")
          print(f"title={title}")
          print(f"download_url={download_url}")
          PY

      - name: Download File
        shell: bash
        env:
          DOWNLOAD_URL: ${{ steps.retrieve.outputs.download_url }}
          FILENAME: ${{ steps.retrieve.outputs.filename }}
        run: |
          set -euo pipefail

          mkdir -p release_files

          curl -L \
            --fail \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            --progress-bar \
            -o "release_files/$FILENAME" \
            "$DOWNLOAD_URL"

          if [ ! -s "release_files/$FILENAME" ]; then
            echo "Downloaded file is empty"
            exit 1
          fi

      - name: Split Large File
        shell: bash
        run: |
          set -euo pipefail

          FILE="release_files/${{ steps.retrieve.outputs.filename }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          if [ -z "$THRESH_MB" ] || [ "$THRESH_MB" = "0" ]; then
            THRESH_MB=1800
          fi

          FILE_SIZE_MB=$(du -m "$FILE" | cut -f1)

          echo "File size: ${FILE_SIZE_MB} MB"

          if [ "$FILE_SIZE_MB" -gt "$THRESH_MB" ]; then
            echo "Splitting large file..."

            BASENAME=$(basename "$FILE")
            NAME="${BASENAME%.*}"

            mkdir -p split_output

            zip -j "split_output/${NAME}.zip" "$FILE"
            cd split_output
            zip -s "${THRESH_MB}m" "${NAME}.zip" --out "${NAME}_split.zip"
            cd ..

            rm -f "$FILE"
            mv split_output/* release_files/

            echo "Split completed"
          else
            echo "No split needed"
          fi

      - name: Get Current Date
        id: get_date
        shell: bash
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p downloads
          mv release_files/* downloads/

          git add downloads

          git commit -m "Add YouTube download - ${{ steps.retrieve.outputs.filename }}" || echo "Nothing to commit"
          git push

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-{0}', github.run_number) }}
          name: ${{ format('YouTube - {0}', steps.retrieve.outputs.filename) }}
          body: |
            **YouTube Download**

            **Title:** ${{ steps.retrieve.outputs.title }}
            **Original Link:** ${{ github.event.inputs.video_url }}
            **Quality:** ${{ github.event.inputs.desired_quality }}
            **Format:** ${{ github.event.inputs.output_format }}
            **Downloaded on:** ${{ steps.get_date.outputs.date }}

          files: release_files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf release_files split_output .download_info 2>/dev/null || true