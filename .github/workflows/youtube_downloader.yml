name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "لینک ویدیو یوتیوب"
        required: true
        type: string

      output_format:
        description: "نوع خروجی"
        required: true
        type: choice
        options:
          - mp4
          - mp3
        default: mp4

      desired_quality:
        description: "کیفیت دلخواه"
        required: false
        type: string
        default: ""

      max_part_mb:
        description: "حداکثر حجم هر پارت (MB)"
        required: false
        type: string
        default: "1800"

permissions:
  contents: write

concurrency:
  group: youtube-downloader
  cancel-in-progress: false

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            curl \
            zip \
            python3 \
            python3-pip

          pip3 install --quiet requests==2.32.3

      - name: Get Download Link
        id: retrieve
        shell: bash
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
          DESIRED_QUALITY: ${{ github.event.inputs.desired_quality }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import os
          import re
          import time
          import requests

          video_url = os.environ["VIDEO_URL"].strip()
          output_format = os.environ["OUTPUT_FORMAT"].strip()
          desired_quality = os.environ.get("DESIRED_QUALITY", "").strip()

          if not video_url.startswith(("http://", "https://")):
              raise Exception("Invalid YouTube URL")

          if output_format not in ("mp4", "mp3"):
              raise Exception("Invalid output format")

          quality = desired_quality or (
              "720p" if output_format == "mp4" else "192kbps"
          )

          endpoints = [
              "https://hub.ytconvert.org/api/download",
              "https://media.ytmp3.gg/api/convert"
          ]

          session = requests.Session()

          session.headers.update({
              "User-Agent": (
                  "Mozilla/5.0 (X11; Linux x86_64) "
                  "AppleWebKit/537.36 "
                  "(KHTML, like Gecko) "
                  "Chrome/125 Safari/537.36"
              )
          })

          # warm-up
          try:
              session.get("https://media.ytmp3.gg/", timeout=20)
          except:
              pass

          payload = {
              "url": video_url,
              "os": "linux",
              "output": {
                  "type": "audio" if output_format == "mp3" else "video",
                  "format": output_format
              }
          }

          if output_format == "mp3":
              payload["audio"] = {
                  "bitrate": quality
              }
          else:
              payload["output"]["quality"] = quality

          response_data = None
          used_endpoint = None

          for endpoint in endpoints:
              try:
                  print(f"Trying endpoint: {endpoint}")

                  resp = session.post(
                      endpoint,
                      json=payload,
                      timeout=30
                  )

                  resp.raise_for_status()

                  response_data = resp.json()
                  used_endpoint = endpoint

                  print(f"Success with: {endpoint}")
                  break

              except Exception as e:
                  print(f"Failed endpoint: {endpoint}")
                  print(str(e))

          if not response_data:
              raise Exception("All endpoints failed")

          status_url = (
              response_data.get("statusUrl")
              or response_data.get("status_url")
              or response_data.get("url")
          )

          title = response_data.get("title", "youtube_media")

          if not status_url:
              raise Exception("No status URL returned")

          download_url = None

          for _ in range(150):
              time.sleep(2)

              r = session.get(status_url, timeout=30)
              r.raise_for_status()

              status = r.json()

              current = status.get("status")

              if current == "completed":
                  download_url = (
                      status.get("downloadUrl")
                      or status.get("download_url")
                      or status.get("url")
                  )

                  if not download_url:
                      raise Exception("No download URL returned")

                  break

              if current == "failed":
                  raise Exception("Conversion failed")

          if not download_url:
              raise Exception("Timeout waiting for conversion")

          video_id_match = re.search(
              r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})',
              video_url
          )

          video_id = (
              video_id_match.group(1)
              if video_id_match
              else "youtube"
          )

          safe_title = re.sub(
              r'[^a-zA-Z0-9\-_()\[\]]',
              '_',
              title.replace(' ', '_')
          )

          safe_title = re.sub(
              r'_+',
              '_',
              safe_title
          ).strip('_')[:70]

          if not safe_title:
              safe_title = video_id

          filename = f"{safe_title}_{video_id}.{output_format}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"filename={filename}\n")
              f.write(f"title={title}\n")
              f.write(f"download_url={download_url}\n")
              f.write(f"endpoint={used_endpoint}\n")

          print("Download ready")
          print("Endpoint:", used_endpoint)
          print("Filename:", filename)
          PY

      - name: Download File
        shell: bash
        env:
          DOWNLOAD_URL: ${{ steps.retrieve.outputs.download_url }}
          FILENAME: ${{ steps.retrieve.outputs.filename }}
        run: |
          set -euo pipefail

          mkdir -p downloads_temp

          echo "Downloading: $FILENAME"

          curl \
            -L \
            --fail \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            --progress-bar \
            -o "downloads_temp/$FILENAME" \
            "$DOWNLOAD_URL"

          if [ ! -s "downloads_temp/$FILENAME" ]; then
            echo "Downloaded file is empty"
            exit 1
          fi

      - name: Split Large File
        shell: bash
        run: |
          set -euo pipefail

          FILE="downloads_temp/${{ steps.retrieve.outputs.filename }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          if [ -z "$THRESH_MB" ] || [ "$THRESH_MB" = "0" ]; then
            THRESH_MB=1800
          fi

          FILE_SIZE_MB=$(du -m "$FILE" | cut -f1)

          echo "File size: ${FILE_SIZE_MB} MB"

          mkdir -p downloads

          if [ "$FILE_SIZE_MB" -gt "$THRESH_MB" ]; then
            echo "Splitting file..."

            BASENAME=$(basename "$FILE")
            NAME="${BASENAME%.*}"

            cd downloads_temp

            zip -0 -s "${THRESH_MB}m" \
              "../downloads/${NAME}.zip" \
              "$BASENAME"

            cd ..

            echo "Split completed"

          else
            mv "$FILE" downloads/
            echo "No split needed"
          fi

      - name: Generate Checksums
        shell: bash
        run: |
          set -euo pipefail

          cd downloads

          sha256sum * > SHA256SUMS.txt

      - name: Commit And Push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add downloads/

          git commit -m \
            "YouTube Download - ${{ steps.retrieve.outputs.filename }}" \
            || echo "Nothing to commit"

          git pull --rebase origin main || true

          git push

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf downloads_temp